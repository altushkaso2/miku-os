name: Miku OS Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso mtools grub-pc-bin grub-efi-amd64-bin git make gcc

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Build Kernel
        run: |
          cargo build \
            --target x86_64-unknown-none \
            -Z build-std=core,compiler_builtins,alloc \
            -Z build-std-features=compiler-builtins-mem

      - name: Create ISO with GRUB
        run: |
          mkdir -p iso_root/boot/grub
          cp target/x86_64-unknown-none/debug/miku-os-release iso_root/boot/kernel.elf
          cat << 'EOF' > iso_root/boot/grub/grub.cfg
          set timeout=0
          set default=0

          menuentry "Miku OS" {
              multiboot2 /boot/kernel.elf
              boot
          }
          EOF
          grub-mkrescue -o miku-os.iso iso_root

      - name: Check Artifacts
        run: |
          ls -lh miku-os.iso
          file miku-os.iso

      - name: Publish Pre-Release
        uses: softprops/action-gh-release@v1
        with:
          files: miku-os.iso
          fail_on_unmatched_files: false
          generate_release_notes: true
